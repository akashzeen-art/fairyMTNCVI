server {
    listen 80;
    listen [::]:80;
    server_name contesmagique.com www.contesmagique.com;

    root /var/www/vasnumero/fairy_MTN_CVI/dist;
    index index.html;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 256;

    # VAS API proxy (avoids CORS in production)
    location /adpoke/ {
        proxy_pass http://68.183.88.91;
        proxy_http_version 1.1;
        proxy_set_header Host 68.183.88.91;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA — react-router routes (/account, etc.)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    access_log /var/log/nginx/contesmagique.com.access.log;
    error_log  /var/log/nginx/contesmagique.com.error.log;
}
